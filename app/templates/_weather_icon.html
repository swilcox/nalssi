{# Inline SVG weather icons. Pass icon_class from the weather_icon filter. #}
{% macro render(icon_class, size="48") %}
<svg class="weather-icon wi-{{ icon_class }}" width="{{ size }}" height="{{ size }}" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
{% if icon_class == "clear" %}
  <circle cx="32" cy="32" r="12" fill="#f59e0b"/>
  <g stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round">
    <line x1="32" y1="6" x2="32" y2="14"/>
    <line x1="32" y1="50" x2="32" y2="58"/>
    <line x1="6" y1="32" x2="14" y2="32"/>
    <line x1="50" y1="32" x2="58" y2="32"/>
    <line x1="13.6" y1="13.6" x2="19.3" y2="19.3"/>
    <line x1="44.7" y1="44.7" x2="50.4" y2="50.4"/>
    <line x1="13.6" y1="50.4" x2="19.3" y2="44.7"/>
    <line x1="44.7" y1="19.3" x2="50.4" y2="13.6"/>
  </g>
{% elif icon_class == "partly-cloudy" %}
  <circle cx="24" cy="24" r="10" fill="#f59e0b"/>
  <g stroke="#f59e0b" stroke-width="2" stroke-linecap="round">
    <line x1="24" y1="6" x2="24" y2="11"/>
    <line x1="24" y1="37" x2="24" y2="42"/>
    <line x1="6" y1="24" x2="11" y2="24"/>
    <line x1="11.3" y1="11.3" x2="14.8" y2="14.8"/>
    <line x1="11.3" y1="36.7" x2="14.8" y2="33.2"/>
    <line x1="36.7" y1="11.3" x2="33.2" y2="14.8"/>
  </g>
  <path d="M22 44 C22 38 27 34 33 34 C34 30 38 27 43 27 C49 27 54 31 54 37 C57 37 60 40 60 44 C60 48 57 50 54 50 L26 50 C22 50 19 47 19 44 Z" fill="var(--cloud-fill, #94a3b8)" opacity="0.9"/>
{% elif icon_class == "cloudy" %}
  <path d="M16 46 C16 40 21 36 27 36 C28 30 33 26 39 26 C46 26 52 31 52 38 C56 38 60 41 60 45 C60 49 56 52 52 52 L20 52 C16 52 12 49 12 46 Z" fill="var(--cloud-fill, #94a3b8)"/>
  <path d="M26 40 C26 35 30 32 35 32 C36 28 39 25 43 25 C48 25 52 29 52 34 C55 34 58 37 58 40 C58 43 55 44 52 44 L30 44 C27 44 24 42 24 40 Z" fill="var(--cloud-fill, #94a3b8)" opacity="0.6" transform="translate(-10, -8)"/>
{% elif icon_class == "rain-light" %}
  <path d="M16 38 C16 32 21 28 27 28 C28 22 33 18 39 18 C46 18 52 23 52 30 C56 30 60 33 60 37 C60 41 56 44 52 44 L20 44 C16 44 12 41 12 38 Z" fill="var(--cloud-fill, #94a3b8)"/>
  <line x1="24" y1="48" x2="22" y2="54" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="48" x2="34" y2="54" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
{% elif icon_class == "rain" %}
  <path d="M16 36 C16 30 21 26 27 26 C28 20 33 16 39 16 C46 16 52 21 52 28 C56 28 60 31 60 35 C60 39 56 42 52 42 L20 42 C16 42 12 39 12 36 Z" fill="var(--cloud-fill, #94a3b8)"/>
  <line x1="22" y1="46" x2="19" y2="54" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="29" y2="54" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="46" x2="39" y2="54" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
{% elif icon_class == "rain-heavy" %}
  <path d="M16 34 C16 28 21 24 27 24 C28 18 33 14 39 14 C46 14 52 19 52 26 C56 26 60 29 60 33 C60 37 56 40 52 40 L20 40 C16 40 12 37 12 34 Z" fill="var(--cloud-fill, #64748b)"/>
  <line x1="20" y1="44" x2="16" y2="54" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="44" x2="26" y2="54" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="44" x2="36" y2="54" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="44" x2="46" y2="54" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
{% elif icon_class == "snow" %}
  <path d="M16 36 C16 30 21 26 27 26 C28 20 33 16 39 16 C46 16 52 21 52 28 C56 28 60 31 60 35 C60 39 56 42 52 42 L20 42 C16 42 12 39 12 36 Z" fill="var(--cloud-fill, #94a3b8)"/>
  <circle cx="24" cy="50" r="2.5" fill="#93c5fd"/>
  <circle cx="34" cy="48" r="2.5" fill="#93c5fd"/>
  <circle cx="44" cy="52" r="2.5" fill="#93c5fd"/>
{% elif icon_class == "snow-heavy" %}
  <path d="M16 34 C16 28 21 24 27 24 C28 18 33 14 39 14 C46 14 52 19 52 26 C56 26 60 29 60 33 C60 37 56 40 52 40 L20 40 C16 40 12 37 12 34 Z" fill="var(--cloud-fill, #64748b)"/>
  <circle cx="20" cy="48" r="2.5" fill="#93c5fd"/>
  <circle cx="30" cy="46" r="2.5" fill="#93c5fd"/>
  <circle cx="40" cy="50" r="2.5" fill="#93c5fd"/>
  <circle cx="50" cy="47" r="2.5" fill="#93c5fd"/>
  <circle cx="25" cy="55" r="2" fill="#bfdbfe"/>
  <circle cx="45" cy="56" r="2" fill="#bfdbfe"/>
{% elif icon_class == "sleet" %}
  <path d="M16 36 C16 30 21 26 27 26 C28 20 33 16 39 16 C46 16 52 21 52 28 C56 28 60 31 60 35 C60 39 56 42 52 42 L20 42 C16 42 12 39 12 36 Z" fill="var(--cloud-fill, #94a3b8)"/>
  <line x1="24" y1="46" x2="22" y2="52" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <circle cx="36" cy="50" r="2.5" fill="#93c5fd"/>
  <line x1="46" y1="46" x2="44" y2="52" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
{% elif icon_class == "thunderstorm" %}
  <path d="M16 34 C16 28 21 24 27 24 C28 18 33 14 39 14 C46 14 52 19 52 26 C56 26 60 29 60 33 C60 37 56 40 52 40 L20 40 C16 40 12 37 12 34 Z" fill="var(--cloud-fill, #475569)"/>
  <polygon points="34,40 28,50 33,50 30,58 42,48 37,48 40,40" fill="#fbbf24"/>
{% elif icon_class == "fog" %}
  <line x1="10" y1="28" x2="54" y2="28" stroke="var(--cloud-fill, #94a3b8)" stroke-width="3" stroke-linecap="round"/>
  <line x1="14" y1="36" x2="50" y2="36" stroke="var(--cloud-fill, #94a3b8)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="18" y1="44" x2="46" y2="44" stroke="var(--cloud-fill, #94a3b8)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="22" y1="52" x2="42" y2="52" stroke="var(--cloud-fill, #94a3b8)" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
{% else %}
  <circle cx="32" cy="32" r="14" stroke="var(--pico-muted-color)" stroke-width="2" fill="none"/>
  <text x="32" y="37" text-anchor="middle" font-size="16" fill="var(--pico-muted-color)">?</text>
{% endif %}
</svg>
{% endmacro %}
