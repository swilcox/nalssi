minimum_pre_commit_version: "4.0.0"

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: ruff-check
        name: ruff lint
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: mypy
        name: mypy
        entry: uv run mypy app tests
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: pytest
        name: pytest
        entry: uv run pytest --no-cov -q
        language: system
        pass_filenames: false
        types: [python]
