<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nalssi{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --pico-font-size: 16px;
        }
        nav ul li strong {
            font-size: 1.2rem;
        }
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        .weather-card {
            border: 1px solid var(--pico-muted-border-color);
            border-radius: var(--pico-border-radius);
            padding: 1rem;
        }
        .weather-card h3 {
            margin-bottom: 0.5rem;
        }
        .weather-card .temp {
            font-size: 2rem;
            font-weight: bold;
        }
        .weather-card .details {
            font-size: 0.9rem;
            color: var(--pico-muted-color);
        }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge-success {
            background: var(--pico-ins-color);
            color: white;
        }
        .badge-error {
            background: var(--pico-del-color);
            color: white;
        }
        .badge-warning {
            background: #e67e22;
            color: white;
        }
        .badge-muted {
            background: var(--pico-muted-color);
            color: white;
        }
        .badge-severity-extreme {
            background: #8b0000;
            color: white;
        }
        .badge-severity-severe {
            background: #d32f2f;
            color: white;
        }
        .badge-severity-moderate {
            background: #e67e22;
            color: white;
        }
        .badge-severity-minor {
            background: #f1c40f;
            color: #333;
        }
        .badge-severity-unknown {
            background: var(--pico-muted-color);
            color: white;
        }
        .badge-urgency-immediate {
            background: #d32f2f;
            color: white;
        }
        .badge-urgency-expected {
            background: #e67e22;
            color: white;
        }
        .badge-urgency-future {
            background: #3498db;
            color: white;
        }
        .badge-urgency-past, .badge-urgency-unknown {
            background: var(--pico-muted-color);
            color: white;
        }
        .alert-extreme {
            border-left: 4px solid #8b0000;
        }
        .alert-severe {
            border-left: 4px solid #d32f2f;
        }
        .alert-moderate {
            border-left: 4px solid #e67e22;
        }
        .alert-minor {
            border-left: 4px solid #f1c40f;
        }
        table td, table th {
            vertical-align: middle;
        }
        .actions {
            white-space: nowrap;
        }
        .actions button, .actions a {
            margin-right: 0.25rem;
            padding: 0.25rem 0.5rem;
            font-size: 0.85rem;
        }
        .error-message {
            color: var(--pico-del-color);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        details summary {
            cursor: pointer;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            text-align: center;
            border: 1px solid var(--pico-muted-border-color);
            border-radius: var(--pico-border-radius);
            padding: 1rem;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
        }
        .stat-card .label {
            color: var(--pico-muted-color);
            font-size: 0.9rem;
        }
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline;
        }
        .htmx-request.htmx-indicator {
            display: inline;
        }
    </style>
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong><a href="/" class="contrast">Nalssi</a></strong></li>
        </ul>
        <ul>
            <li><a href="/">Dashboard</a></li>
            <li><a href="/alerts">Alerts</a></li>
            <li><a href="/locations">Locations</a></li>
            <li><a href="/backends">Backends</a></li>
            <li><a href="/system">System</a></li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script>
        document.body.addEventListener("clearErrors", function() {
            document.querySelectorAll(".error-message").forEach(function(el) {
                el.innerHTML = "";
            });
        });
    </script>
</body>
</html>
