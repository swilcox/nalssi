services:
  postgres-test:
    image: postgres:16-alpine
    container_name: nalssi-postgres-test
    environment:
      - POSTGRES_USER=nalssi_test
      - POSTGRES_PASSWORD=nalssi_test
      - POSTGRES_DB=nalssi_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nalssi_test"]
      interval: 2s
      timeout: 5s
      retries: 5
